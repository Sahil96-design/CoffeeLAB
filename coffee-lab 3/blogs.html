<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories — Coffee Lab</title>
<meta name="description" content="Stories from Indian coffee: the smuggler saint of Chikkamagaluru, the accident behind Monsooned Malabar, and coffee that keeps forests standing.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,600&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><circle cx="20" cy="20" r="19" fill="%231F3D2B"/><ellipse cx="20" cy="20" rx="8.5" ry="12" fill="%23DFA126" transform="rotate(24 20 20)"/></svg>'>
</head>
<body>
<header class="site-header" id="site-header"></header>

<main>
  <section class="dir-hero">
    <div class="wrap">
      <p class="eyebrow">Stories</p>
      <h1>Tales from Indian coffee</h1>
      <p class="lede" style="color:#C9D3C3">Four hundred years of smuggled seeds, monsoon accidents and forest farms — the history behind the beans in the directory.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="article-grid" id="stories-grid"></div>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="js/data.js"></script>
<script src="js/content.js"></script>
<script src="js/app.js"></script>
<script>
renderChrome("blogs");
document.getElementById("stories-grid").innerHTML = ARTICLES.filter(a => a.type === "story").map(a => `
  <a class="article-card" href="article.html?id=${a.id}">
    <span class="article-meta">${esc(a.tag)}<i class="dot"></i>${a.minutes} min read</span>
    <h3>${esc(a.title)}</h3>
    <p>${esc(a.standfirst)}</p>
    <span class="read-more">Read the story →</span>
  </a>`).join("");
</script>
</body>
</html>
